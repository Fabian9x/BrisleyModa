# Publica la carpeta dist/ (build de Vite). En el repo: Settings → Pages → Source = GitHub Actions.
# Si en vez de eso elegís "Deploy from a branch" en la raíz del repo, se sirve el index.html
# fuente con /src/main.tsx y falla (404). Tiene que ser este workflow.
name: Desplegar en GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Comprobar que dist es un build de producción
        run: |
          if grep -q 'src/main.tsx' dist/index.html; then
            echo "::error::dist/index.html sigue apuntando a Vite en desarrollo. Revisá vite.config (base)."
            exit 1
          fi
          if ! grep -q "/${{ github.event.repository.name }}/assets/" dist/index.html; then
            echo "::error::dist/index.html no incluye assets con la base del repo."
            exit 1
          fi
      - name: Vista previa del index publicado (debug)
        run: head -n 30 dist/index.html
      - uses: actions/upload-pages-artifact@v4
        with:
          path: dist
          include-hidden-files: true

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
